---
layout: lab
---

<article class="page-intro">
  <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" | default: "Research Note" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.excerpt %}
    <p>{{ page.excerpt | strip_html }}</p>
  {% endif %}
</article>

<section class="content-band glass-card bio-card">
  {{ content }}
</section>
