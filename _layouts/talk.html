---
layout: lab
---

<article class="page-intro">
  <p class="eyebrow">{{ page.talk_type | default: "Talk" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.venue or page.location %}
    <p>{{ page.venue }}{% if page.location %} · {{ page.location }}{% endif %}</p>
  {% endif %}
</article>

<section class="content-band glass-card bio-card">
  {{ content }}
</section>
