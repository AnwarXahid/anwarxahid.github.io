<!doctype html>
<html lang="{{ site.locale | default: 'en-US' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != "" %}{{ page.title }} {{ site.title_separator | default: "-" }} {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <meta name="keywords" content="{{ site.keywords }}">
    <meta name="author" content="{{ site.name }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta name="theme-color" content="#05060b">

    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page.title and page.title != "" %}{{ page.title }} {{ site.title_separator | default: "-" }} {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/images/social-preview.svg' | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:creator" content="@{{ site.twitter.username | default: 'anwarxahid' }}">

    <link rel="icon" href="{{ '/images/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/lab.css' | relative_url }}">

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Anwar Hossain Zahid",
        "jobTitle": "PhD Candidate at Iowa State University",
        "url": "{{ site.url }}",
        "email": "mailto:{{ site.author.email }}",
        "sameAs": [
          "https://github.com/AnwarXahid",
          "https://www.linkedin.com/in/anwar-hossain-zahid-a46195108/",
          "https://scholar.google.com/citations?user=_ze57HEAAAAJ&hl=en"
        ],
        "knowsAbout": [
          "ML Reliability",
          "LLM Evaluation",
          "Numerical Stability",
          "AI Reliability",
          "Software Engineering",
          "HPC Systems"
        ]
      }
    </script>
  </head>
  <body class="{{ page.body_class | default: 'lab-page' }}">
    <div class="loader" aria-hidden="true">
      <div class="loader__ring"></div>
      <span>Initializing research interface</span>
    </div>

    <div class="cursor-dot" aria-hidden="true"></div>
    <div class="scroll-progress" aria-hidden="true"></div>
    <canvas id="lab-field" aria-hidden="true"></canvas>
    <div class="ambient-field" aria-hidden="true">
      <div class="light light--a"></div>
      <div class="light light--b"></div>
      <div class="light light--c"></div>
      <div class="grid-horizon"></div>
    </div>

    <header class="site-header" data-nav>
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Anwar Hossain Zahid home">
        <span class="brand-mark">AZ</span>
        <span class="brand-text">Anwar Hossain Zahid</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="{{ '/#research' | relative_url }}">Research</a>
        <a href="{{ '/#projects' | relative_url }}">Projects</a>
        <a href="{{ '/#publications' | relative_url }}">Publications</a>
        <a href="{{ '/blog/' | relative_url }}">Notes</a>
        <a href="{{ '/#contact' | relative_url }}">Contact</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div>
        <strong>Anwar Hossain Zahid</strong>
        <span>Reliable AI systems, debugging infrastructure, and evaluation science.</span>
      </div>
      <div class="footer-links">
        <a href="https://github.com/AnwarXahid">GitHub</a>
        <a href="https://www.linkedin.com/in/anwar-hossain-zahid-a46195108/">LinkedIn</a>
        <a href="https://scholar.google.com/citations?user=_ze57HEAAAAJ&hl=en">Scholar</a>
      </div>
    </footer>

    <script src="{{ '/assets/js/lab.js' | relative_url }}" defer></script>
  </body>
</html>
